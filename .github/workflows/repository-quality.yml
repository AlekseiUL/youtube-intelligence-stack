name: repository-quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install package with dev extras
        run: python -m pip install -e ".[dev]"
      - name: Repository quality scan
        run: python scripts/repository_quality.py
      - name: Unit tests
        run: python -m pytest -q
      - name: CLI doctor
        run: youtube-intel doctor
      - name: Init instance smoke
        run: |
          tmp=$(mktemp -d)
          youtube-intel init "$tmp/youtube-intel-smoke" --template creator
          test -f "$tmp/youtube-intel-smoke/watchlists/topics.yaml"
          test -f "$tmp/youtube-intel-smoke/watchlists/channels.yaml"
          grep -q "content hooks" "$tmp/youtube-intel-smoke/watchlists/topics.yaml"
      - name: Offline report smoke
        run: |
          tmp=$(mktemp -d)
          youtube-intel init "$tmp/youtube-intel-smoke"
          youtube-intel search "$tmp/youtube-intel-smoke" --query "AI agents" --search-provider cache --skip-watchlist-channels --continue-on-search-error
          youtube-intel report "$tmp/youtube-intel-smoke" --days 3650 --out "$tmp/youtube-intel-smoke/report.md"
          test -s "$tmp/youtube-intel-smoke/report.md"
